name: build-packages

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  freebsd:
    runs-on: ubuntu-latest
    name: FreeBSD package build
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare cache directories
        run: |
          mkdir -p .ci-cache/distfiles .ci-cache/pkg

      - name: Restore FreeBSD download cache
        uses: actions/cache@v4
        with:
          path: |
            .ci-cache/distfiles
            .ci-cache/pkg
          key: freebsd-14_3-downloads-v1-${{ hashFiles('ports/www/adguardhome/Makefile', 'ports/www/adguardhome/distinfo', 'scripts/build-packages.sh') }}
          restore-keys: |
            freebsd-14_3-downloads-v1-

      - name: Build adguardhome and os-adguardhome
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.3"
          # All setup + build run here (as root) and are captured to build.log.
          # The script always exits 0 so the VM workspace (with build.log and
          # build.status) is copied back even on failure; a later host step
          # evaluates build.status and fails the job if needed.
          run: |
            (
              set -eux
              mkdir -p "${GITHUB_WORKSPACE}/.ci-cache/distfiles" "${GITHUB_WORKSPACE}/.ci-cache/pkg"
              pkg update -f
              pkg install -y git
              if [ ! -d /usr/ports/.git ]; then
                rm -rf /usr/ports
                git clone --depth 1 https://git.FreeBSD.org/ports.git /usr/ports
              fi
              rm -rf /usr/ports/distfiles
              ln -s "${GITHUB_WORKSPACE}/.ci-cache/distfiles" /usr/ports/distfiles
              rm -rf /var/cache/pkg
              ln -s "${GITHUB_WORKSPACE}/.ci-cache/pkg" /var/cache/pkg
              ./scripts/build-packages.sh
            ) > "${GITHUB_WORKSPACE}/build.log" 2>&1
            echo "$?" > "${GITHUB_WORKSPACE}/build.status"
            exit 0

      - name: Evaluate build result (temporary diagnostic)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          STATUS="$(cat build.status 2>/dev/null || echo missing)"
          echo "build.status = ${STATUS}"
          echo "===== build.log (tail 120) ====="
          tail -n 120 build.log 2>/dev/null || echo "(build.log not found)"
          if [ "${STATUS}" = "0" ]; then
            echo "build succeeded"
            exit 0
          fi
          BODY="$(tail -c 55000 build.log 2>/dev/null || echo '(build.log not found)')"
          jq -n --arg t "CI diagnostic: build failure run ${{ github.run_id }} (status ${STATUS})" \
                --arg b "${BODY}" \
                '{title:$t, body:("```\n"+$b+"\n```")}' > payload.json
          curl -fsS -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues" \
            -d @payload.json > issue.json
          echo "created diagnostic issue: $(jq -r .html_url issue.json)"
          exit 1

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: freebsd-amd64-packages
          path: |
            artifacts/All/
            artifacts/ABI
          if-no-files-found: error
