name: build-packages

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  freebsd:
    runs-on: ubuntu-24.04
    name: FreeBSD package build
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare cache directories
        run: |
          mkdir -p .ci-cache/distfiles .ci-cache/pkg

      - name: Restore FreeBSD download cache
        uses: actions/cache@v4
        with:
          path: |
            .ci-cache/distfiles
            .ci-cache/pkg
          key: freebsd-14_4-downloads-v1-${{ hashFiles('ports/www/adguardhome/Makefile', 'ports/www/adguardhome/distinfo', 'scripts/build-packages.sh') }}
          restore-keys: |
            freebsd-14_4-downloads-v1-

      - name: Build adguardhome and os-adguardhome
        id: vm
        continue-on-error: true
        # NOTE: the floating tag @v1 currently resolves to v1.5.0, whose FreeBSD
        # VM fails to provision on GitHub runners. Pinned to the exact revision
        # that vmactions' own green CI uses, with the same knobs (usesh + mem).
        uses: vmactions/freebsd-vm@1e881ae96fb58a8c6f99d7341b4ab82d14522dbe
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          release: "14.4"
          usesh: true
          mem: 6144
          envs: 'GH_TOKEN GITHUB_REPOSITORY GITHUB_RUN_ID'
          # All setup + build run here (as root), captured to build.log. Because
          # workspace copyback only happens on a clean VM run, we ALSO report the
          # log from inside the VM (curl -> GitHub issue) so a failure is visible
          # even if copyback is skipped. Always exit 0 so copyback still tries.
          run: |
            set +e  # vmactions runs this under `sh -e`; disable so a failing build command doesn't abort before we capture its output
            report() { # $1=title $2=body
              jq -n --arg t "$1" --arg b "$2" '{title:$t, body:$b}' > /tmp/p.json 2>/dev/null || return 0
              curl -fsS -X POST -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues" \
                -d @/tmp/p.json >/dev/null 2>&1 || true
            }
            sysinfo() { printf 'df:\n%s\nmem(physmem bytes): %s\ncpus: %s\n' "$(df -h)" "$(sysctl -n hw.physmem)" "$(sysctl -n hw.ncpu)"; }
            logtail() { printf '```\n%s\n```' "$(tail -c 40000 "$1" 2>/dev/null)"; }
            pkg install -y curl jq >/dev/null 2>&1 || true
            report "DIAG boot-ok ${GITHUB_RUN_ID}" "$(sysinfo)"
            cd "${GITHUB_WORKSPACE}"
            pkg update -f >/tmp/l 2>&1
            pkg install -y git >>/tmp/l 2>&1
            rm -rf /usr/ports
            timeout 900 git clone --depth 1 --filter=blob:none https://git.FreeBSD.org/ports.git /usr/ports >>/tmp/l 2>&1
            report "DIAG clone rc=$? ${GITHUB_RUN_ID}" "$(sysinfo)"
            mkdir -p .ci-cache/distfiles .ci-cache/pkg
            rm -rf /usr/ports/distfiles; ln -s "$PWD/.ci-cache/distfiles" /usr/ports/distfiles
            rm -rf /var/cache/pkg; ln -s "$PWD/.ci-cache/pkg" /var/cache/pkg

            # ---- inline build (mirrors scripts/build-packages.sh) with markers ----
            report "DIAG s4a portbuild-start ${GITHUB_RUN_ID}" "starting make package for ports/www/adguardhome"
            ( set -eux; make -C ports/www/adguardhome clean package BATCH=yes PACKAGES="$PWD/artifacts" ) >/tmp/s4a 2>&1
            RC=$?; report "DIAG s4a portbuild rc=${RC} ${GITHUB_RUN_ID}" "$(logtail /tmp/s4a)"
            [ "$RC" = 0 ] || exit 0

            PKG=$(find "$PWD/artifacts/All" -maxdepth 1 -name 'adguardhome-*.pkg' | head -1)
            ( set -eux; pkg add -f "$PKG" ) >/tmp/s4b 2>&1
            RC=$?; report "DIAG s4b pkgadd rc=${RC} ${GITHUB_RUN_ID}" "pkg=$PKG"$'\n'"$(logtail /tmp/s4b)"
            [ "$RC" = 0 ] || exit 0

            ( set -eux; rm -rf dns/adguardhome/work; make -C dns/adguardhome _PLUGIN_DEVEL= package ) >/tmp/s4c 2>&1
            RC=$?; report "DIAG s4c pluginbuild rc=${RC} ${GITHUB_RUN_ID}" "$(logtail /tmp/s4c)"
            [ "$RC" = 0 ] || exit 0

            ( set -eux; cp dns/adguardhome/work/pkg/*.pkg "$PWD/artifacts/All/"; pkg repo "$PWD/artifacts/All"; pkg config ABI > "$PWD/artifacts/ABI" ) >/tmp/s4d 2>&1
            RC=$?; report "DIAG s4d finalize rc=${RC} ${GITHUB_RUN_ID}" "$(logtail /tmp/s4d)"
            echo "${RC}" > "${GITHUB_WORKSPACE}/build.status"
            exit 0

      - name: Evaluate build result (temporary diagnostic)
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "vmactions step outcome: ${{ steps.vm.outcome }}"
          STATUS="$(cat build.status 2>/dev/null || echo missing)"
          echo "build.status = ${STATUS}"
          if [ ! -f build.status ]; then
            echo "build.status missing -> my run script never completed inside the VM (VM provisioning/boot or copyback failed)."
          fi
          echo "===== build.log (tail 120) ====="
          tail -n 120 build.log 2>/dev/null || echo "(build.log not found)"
          if [ "${STATUS}" = "0" ]; then
            echo "build succeeded"
            exit 0
          fi
          BODY="$(tail -c 55000 build.log 2>/dev/null || echo '(build.log not found)')"
          HEADER="vmactions outcome: ${{ steps.vm.outcome }} | build.status: ${STATUS}"
          jq -n --arg t "CI diagnostic: build failure run ${{ github.run_id }} (status ${STATUS})" \
                --arg h "${HEADER}" --arg b "${BODY}" \
                '{title:$t, body:("**"+$h+"**\n\n```\n"+$b+"\n```")}' > payload.json
          curl -fsS -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues" \
            -d @payload.json > issue.json
          echo "created diagnostic issue: $(jq -r .html_url issue.json)"
          exit 1

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: freebsd-amd64-packages
          path: |
            artifacts/All/
            artifacts/ABI
          if-no-files-found: error
